<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Assets | Asset Management System</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-zinc-100 text-zinc-900">
    <div class="min-h-screen md:flex">
        <aside class="bg-zinc-950 text-white md:w-64">
            <div class="border-b border-zinc-800 p-5">
                <h1 class="text-lg font-bold">Asset Manager</h1>
                <p id="roleLabel" class="mt-1 text-sm text-zinc-400"></p>
            </div>
            <nav class="grid gap-1 p-3 text-sm">
                <a class="rounded-md px-3 py-2 text-zinc-300 hover:bg-zinc-800 hover:text-white" href="dashboard.html">Dashboard</a>
                <a class="rounded-md px-3 py-2 text-zinc-300 hover:bg-zinc-800 hover:text-white" href="employees.html">Employees</a>
                <a class="rounded-md bg-zinc-800 px-3 py-2 font-medium" href="assets.html">Assets</a>
                <a class="rounded-md px-3 py-2 text-zinc-300 hover:bg-zinc-800 hover:text-white" href="assignments.html">Assignments</a>
                <a class="rounded-md px-3 py-2 text-zinc-300 hover:bg-zinc-800 hover:text-white" href="profile.html">Profile</a>
                <button class="rounded-md px-3 py-2 text-left text-zinc-300 hover:bg-zinc-800 hover:text-white" onclick="logout()">Logout</button>
            </nav>
        </aside>

        <div class="flex min-h-screen flex-1 flex-col">
            <header class="flex items-center justify-between border-b border-zinc-200 bg-white px-6 py-4">
                <div>
                    <p class="text-sm text-zinc-500">Inventory</p>
                    <h2 class="text-xl font-semibold">Assets</h2>
                </div>
                <div class="text-right text-sm">
                    <p id="profileLabel" class="font-medium"></p>
                    <p class="text-zinc-500">Signed in</p>
                </div>
            </header>

            <main class="flex-1 p-6">
                <div id="alertBox" class="hidden"></div>

                <section data-admin-only class="mb-6 rounded-lg bg-white p-5 shadow-sm ring-1 ring-zinc-200">
                    <h3 id="formTitle" class="mb-4 font-semibold">Add Asset</h3>
                    <form id="assetForm" class="grid gap-4 lg:grid-cols-5">
                        <input id="assetName" required placeholder="Asset Name" class="rounded-md border border-zinc-300 px-3 py-2 text-sm outline-none focus:border-sky-600 focus:ring-2 focus:ring-sky-100">
                        <input id="assetType" required placeholder="Asset Type" class="rounded-md border border-zinc-300 px-3 py-2 text-sm outline-none focus:border-sky-600 focus:ring-2 focus:ring-sky-100">
                        <input id="serialNumber" required placeholder="Serial Number" class="rounded-md border border-zinc-300 px-3 py-2 text-sm outline-none focus:border-sky-600 focus:ring-2 focus:ring-sky-100">
                        <select id="status" class="rounded-md border border-zinc-300 px-3 py-2 text-sm outline-none focus:border-sky-600 focus:ring-2 focus:ring-sky-100">
                            <option>Available</option>
                            <option>Assigned</option>
                            <option>Maintenance</option>
                            <option>Retired</option>
                        </select>
                        <div class="flex gap-2">
                            <button id="submitAsset" class="rounded-md bg-sky-700 px-4 py-2 text-sm font-semibold text-white hover:bg-sky-800" type="submit">Add Asset</button>
                            <button id="cancelEdit" class="hidden rounded-md border border-zinc-300 px-4 py-2 text-sm hover:bg-zinc-50" type="button">Cancel</button>
                        </div>
                    </form>
                </section>

                <section class="rounded-lg bg-white shadow-sm ring-1 ring-zinc-200">
                    <div class="flex flex-col gap-3 border-b border-zinc-200 px-5 py-4 md:flex-row md:items-center md:justify-between">
                        <h3 class="font-semibold">Asset List</h3>
                        <input id="assetSearch" placeholder="Search assets" class="w-full rounded-md border border-zinc-300 px-3 py-2 text-sm outline-none focus:border-sky-600 focus:ring-2 focus:ring-sky-100 md:w-72">
                    </div>
                    <div class="overflow-x-auto">
                        <table class="w-full text-left text-sm">
                            <thead class="bg-zinc-50 text-zinc-600">
                                <tr>
                                    <th class="px-4 py-3 font-medium">ID</th>
                                    <th class="px-4 py-3 font-medium">Asset Name</th>
                                    <th class="px-4 py-3 font-medium">Type</th>
                                    <th class="px-4 py-3 font-medium">Serial Number</th>
                                    <th class="px-4 py-3 font-medium">Status</th>
                                    <th data-admin-only class="px-4 py-3 font-medium">Actions</th>
                                </tr>
                            </thead>
                            <tbody id="assetTable"></tbody>
                        </table>
                    </div>
                </section>
            </main>

            <footer class="border-t border-zinc-200 bg-white px-6 py-3 text-sm text-zinc-500">
                Asset Management System
            </footer>
        </div>
    </div>

    <script src="js/common.js"></script>
    <script src="js/assets.js"></script>
</body>
</html>
