<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | Asset Management System</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-zinc-100 text-zinc-900">
    <div class="min-h-screen md:flex">
        <aside class="bg-zinc-950 text-white md:w-64">
            <div class="border-b border-zinc-800 p-5">
                <h1 class="text-lg font-bold">Asset Manager</h1>
                <p id="roleLabel" class="mt-1 text-sm text-zinc-400"></p>
            </div>
            <nav class="grid gap-1 p-3 text-sm">
                <a class="rounded-md bg-zinc-800 px-3 py-2 font-medium" href="dashboard.html">Dashboard</a>
                <a class="rounded-md px-3 py-2 text-zinc-300 hover:bg-zinc-800 hover:text-white" href="employees.html">Employees</a>
                <a class="rounded-md px-3 py-2 text-zinc-300 hover:bg-zinc-800 hover:text-white" href="assets.html">Assets</a>
                <a class="rounded-md px-3 py-2 text-zinc-300 hover:bg-zinc-800 hover:text-white" href="assignments.html">Assignments</a>
                <a class="rounded-md px-3 py-2 text-zinc-300 hover:bg-zinc-800 hover:text-white" href="profile.html">Profile</a>
                <button class="rounded-md px-3 py-2 text-left text-zinc-300 hover:bg-zinc-800 hover:text-white" onclick="logout()">Logout</button>
            </nav>
        </aside>

        <div class="flex min-h-screen flex-1 flex-col">
            <header class="flex items-center justify-between border-b border-zinc-200 bg-white px-6 py-4">
                <div>
                    <p class="text-sm text-zinc-500">Asset Management System</p>
                    <h2 class="text-xl font-semibold">Dashboard</h2>
                </div>
                <div class="text-right text-sm">
                    <p id="profileLabel" class="font-medium"></p>
                    <p class="text-zinc-500">Signed in</p>
                </div>
            </header>

            <main class="flex-1 p-6">
                <div id="alertBox" class="hidden"></div>

                <section class="grid gap-4 sm:grid-cols-2 xl:grid-cols-4">
                    <article class="rounded-lg bg-white p-5 shadow-sm ring-1 ring-zinc-200">
                        <p class="text-sm text-zinc-500">Total Employees</p>
                        <p id="totalEmployees" class="mt-3 text-3xl font-bold">0</p>
                    </article>
                    <article class="rounded-lg bg-white p-5 shadow-sm ring-1 ring-zinc-200">
                        <p class="text-sm text-zinc-500">Total Assets</p>
                        <p id="totalAssets" class="mt-3 text-3xl font-bold">0</p>
                    </article>
                    <article class="rounded-lg bg-white p-5 shadow-sm ring-1 ring-zinc-200">
                        <p class="text-sm text-zinc-500">Assigned Assets</p>
                        <p id="assignedAssets" class="mt-3 text-3xl font-bold">0</p>
                    </article>
                    <article class="rounded-lg bg-white p-5 shadow-sm ring-1 ring-zinc-200">
                        <p class="text-sm text-zinc-500">Available Assets</p>
                        <p id="availableAssets" class="mt-3 text-3xl font-bold">0</p>
                    </article>
                </section>

                <section class="mt-6 rounded-lg bg-white shadow-sm ring-1 ring-zinc-200">
                    <div class="border-b border-zinc-200 px-5 py-4">
                        <h3 class="font-semibold">Recent Assignments</h3>
                    </div>
                    <div class="overflow-x-auto">
                        <table class="w-full text-left text-sm">
                            <thead class="bg-zinc-50 text-zinc-600">
                                <tr>
                                    <th class="px-4 py-3 font-medium">Employee</th>
                                    <th class="px-4 py-3 font-medium">Asset</th>
                                    <th class="px-4 py-3 font-medium">Assigned</th>
                                    <th class="px-4 py-3 font-medium">Returned</th>
                                </tr>
                            </thead>
                            <tbody id="recentAssignments"></tbody>
                        </table>
                    </div>
                </section>
            </main>

            <footer class="border-t border-zinc-200 bg-white px-6 py-3 text-sm text-zinc-500">
                Asset Management System
            </footer>
        </div>
    </div>

    <script src="js/common.js"></script>
    <script src="js/dashboard.js"></script>
</body>
</html>
